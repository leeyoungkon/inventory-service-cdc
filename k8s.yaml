apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service-cdc
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-service-cdc
  template:
    metadata:
      labels:
        app: inventory-service-cdc
    spec:
      containers:
        - name: inventory-service-cdc
          image: yklee2002/inventory-service-cdc:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql.default.svc.cluster.local:3306/inventorydb?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
            - name: SPRING_DATASOURCE_USERNAME
              value: root
            - name: SPRING_DATASOURCE_PASSWORD
              value: root1234
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: my-cluster-kafka-bootstrap.kafka:9092
            - name: SPRING_KAFKA_CONSUMER_GROUP_ID
              value: inventory-group
            - name: APP_KAFKA_TOPIC_ORDER_CREATED
              value: outbox.event.Order
          
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service-cdc
  namespace: default
spec:
  type: NodePort
  selector:
    app: inventory-service-cdc
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30140
