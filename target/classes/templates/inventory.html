<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Inventory Service</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 24px; }
        h1 { margin-bottom: 16px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        th { background: #f5f5f5; }
        .note { margin-bottom: 14px; color: #555; }
    </style>
</head>
<body>
<h1>재고 현황</h1>
<p class="note">Kafka에서 주문 이벤트를 수신하면 이 화면의 재고 수량이 변경됩니다.</p>
<table>
    <thead>
    <tr>
        <th>상품명</th>
        <th>현재 재고</th>
        <th>수정 시각</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="item : ${items}">
        <td th:text="${item.productName}">Keyboard</td>
        <td th:text="${item.stock}">100</td>
        <td th:text="${item.updatedAt}">2026-04-23T20:00:00</td>
    </tr>
    </tbody>
</table>
</body>
</html>
