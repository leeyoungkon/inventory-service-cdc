<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Inventory Service</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 24px; }
        h1 { margin-bottom: 16px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        th { background: #f5f5f5; }
        .note { margin-bottom: 14px; color: #555; }
        .status { font-size: 12px; color: #888; margin-top: 8px; }
        .updated { background-color: #fffde7; transition: background-color 1.5s ease; }
    </style>
</head>
<body>
<h1>재고 현황</h1>
<p class="note">Kafka에서 주문 이벤트를 수신하면 이 화면의 재고 수량이 변경됩니다.</p>
<table>
    <thead>
    <tr>
        <th>상품명</th>
        <th>현재 재고</th>
        <th>수정 시각</th>
    </tr>
    </thead>
    <tbody id="inventory-body">
    <tr th:each="item : ${items}">
        <td th:text="${item.productName}">Keyboard</td>
        <td th:text="${item.stock}">100</td>
        <td th:text="${item.updatedAt}">2026-04-23T20:00:00</td>
    </tr>
    </tbody>
</table>
<p class="status">마지막 갱신: <span id="last-updated">-</span> (3초마다 자동 갱신)</p>

<script>
    const prevData = {};

    function formatDateTime(isoStr) {
        if (!isoStr) return '-';
        return isoStr.replace('T', ' ').substring(0, 19);
    }

    async function refreshInventory() {
        try {
            const res = await fetch('/api/inventory');
            const items = await res.json();
            const tbody = document.getElementById('inventory-body');
            tbody.innerHTML = '';
            items.forEach(item => {
                const tr = document.createElement('tr');
                const isChanged = prevData[item.productName] !== undefined
                    && prevData[item.productName] !== item.stock;
                if (isChanged) {
                    tr.className = 'updated';
                    setTimeout(() => tr.className = '', 1500);
                }
                tr.innerHTML = `<td>${item.productName}</td><td>${item.stock}</td><td>${formatDateTime(item.updatedAt)}</td>`;
                tbody.appendChild(tr);
                prevData[item.productName] = item.stock;
            });
            document.getElementById('last-updated').textContent = new Date().toLocaleTimeString('ko-KR');
        } catch (e) {
            console.error('갱신 실패:', e);
        }
    }

    refreshInventory();
    setInterval(refreshInventory, 3000);
</script>
</body>
</html>
